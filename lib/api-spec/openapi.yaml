openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: network
    description: Cycling node network (knooppunten) operations
  - name: routing
    description: Node-based route planning
  - name: regions
    description: Quick-jump regions
  - name: routes
    description: Saving and reopening planned routes
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /network:
    get:
      operationId: getNetwork
      tags: [network]
      summary: Get cycling node network for a bounding box
      description: >
        Returns the numbered cycling nodes (knooppunten) and the network
        segments that connect them, within the given bounding box. Data is
        sourced from OpenStreetMap and cached.
      parameters:
        - name: bbox
          in: query
          required: true
          description: "Bounding box as minLon,minLat,maxLon,maxLat (WGS84)."
          schema:
            type: string
      responses:
        "200":
          description: Network data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NetworkData"
        "400":
          description: Invalid bounding box
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "502":
          description: Upstream data source error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /route:
    post:
      operationId: planRoute
      tags: [routing]
      summary: Plan a route along the node network
      description: >
        Given an ordered list of selected nodes, computes the route that
        follows the cycling network segments between each consecutive pair of
        nodes, returning the full geometry, the ordered node numbers, and the
        total distance.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RouteRequest"
      responses:
        "200":
          description: Planned route
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoutePlan"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "422":
          description: No connecting path found between the selected nodes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "502":
          description: Upstream data source error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /regions:
    get:
      operationId: getRegions
      tags: [regions]
      summary: Get quick-jump regions
      description: A curated list of popular cycling regions to jump the map to.
      responses:
        "200":
          description: Regions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Region"
  /geocode:
    get:
      operationId: geocodeMunicipality
      tags: [regions]
      summary: Search for a municipality (gemeente) by name
      description: >
        Searches OpenStreetMap (Nominatim) for municipalities in the
        Netherlands and Belgium matching the query, returning each match's
        center and bounding box so the map can be fitted to the area.
      parameters:
        - name: q
          in: query
          required: true
          description: "Municipality name to search for (min 2 characters)."
          schema:
            type: string
      responses:
        "200":
          description: Matching municipalities
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MunicipalityResult"
        "400":
          description: Invalid query
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "502":
          description: Upstream data source error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /routes:
    get:
      operationId: listSavedRoutes
      tags: [routes]
      summary: List the current user's saved routes
      description: >
        Returns the saved routes belonging to the current browser, most
        recently saved first. Returns summaries only (no full geometry).
      responses:
        "200":
          description: Saved routes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SavedRouteSummary"
    post:
      operationId: saveRoute
      tags: [routes]
      summary: Save a planned route
      description: Persists a named route (selected nodes + planned geometry).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveRouteRequest"
      responses:
        "201":
          description: The saved route
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SavedRoute"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /routes/claim:
    post:
      operationId: claimSavedRoutes
      tags: [routes]
      summary: Claim routes saved anonymously before signing in
      description: >
        Reassigns routes that were saved under an old per-browser anonymous
        owner key to the current signed-in user, so nothing saved before the
        first sign-in is lost. Returns how many routes were imported.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClaimSavedRoutesRequest"
      responses:
        "200":
          description: The number of routes imported into the account
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClaimSavedRoutesResult"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /routes/{id}:
    get:
      operationId: getSavedRoute
      tags: [routes]
      summary: Get a saved route by id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: The saved route
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SavedRoute"
        "404":
          description: Route not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    patch:
      operationId: updateSavedRoute
      tags: [routes]
      summary: Update a saved route (e.g. rename it)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSavedRouteRequest"
      responses:
        "200":
          description: The updated saved route
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SavedRoute"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Route not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    delete:
      operationId: deleteSavedRoute
      tags: [routes]
      summary: Delete a saved route by id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Route deleted
        "404":
          description: Route not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ApiError:
      type: object
      properties:
        message:
          type: string
      required:
        - message
    NetworkNode:
      type: object
      description: A numbered cycling node (knooppunt).
      properties:
        id:
          type: string
          description: Stable OSM node id.
        ref:
          type: string
          description: The knooppunt number shown on signage (e.g. "34").
        lat:
          type: number
        lon:
          type: number
      required:
        - id
        - ref
        - lat
        - lon
    NetworkSegment:
      type: object
      description: A network path geometry connecting points in the node network.
      properties:
        id:
          type: string
        coordinates:
          type: array
          description: "Ordered [lon, lat] pairs describing the segment line."
          items:
            type: array
            items:
              type: number
      required:
        - id
        - coordinates
    NetworkData:
      type: object
      properties:
        nodes:
          type: array
          items:
            $ref: "#/components/schemas/NetworkNode"
        segments:
          type: array
          items:
            $ref: "#/components/schemas/NetworkSegment"
        truncated:
          type: boolean
          description: True if the area was too large and results were limited.
      required:
        - nodes
        - segments
        - truncated
    RouteRequestNode:
      type: object
      properties:
        id:
          type: string
        ref:
          type: string
        lat:
          type: number
        lon:
          type: number
      required:
        - id
        - ref
        - lat
        - lon
    RouteRequest:
      type: object
      properties:
        nodes:
          type: array
          description: Ordered list of selected nodes to route through.
          items:
            $ref: "#/components/schemas/RouteRequestNode"
      required:
        - nodes
    RouteLeg:
      type: object
      description: One leg of the route between two consecutive nodes.
      properties:
        fromRef:
          type: string
        toRef:
          type: string
        distanceMeters:
          type: number
        coordinates:
          type: array
          items:
            type: array
            items:
              type: number
      required:
        - fromRef
        - toRef
        - distanceMeters
        - coordinates
    RoutePlan:
      type: object
      properties:
        nodeRefs:
          type: array
          description: The ordered knooppunt numbers along the route.
          items:
            type: string
        coordinates:
          type: array
          description: "Full route geometry as ordered [lon, lat] pairs."
          items:
            type: array
            items:
              type: number
        distanceMeters:
          type: number
        legs:
          type: array
          items:
            $ref: "#/components/schemas/RouteLeg"
      required:
        - nodeRefs
        - coordinates
        - distanceMeters
        - legs
    UpdateSavedRouteRequest:
      type: object
      properties:
        name:
          type: string
          description: New user-provided name for the route.
      required:
        - name
    ClaimSavedRoutesRequest:
      type: object
      properties:
        anonymousKey:
          type: string
          description: >
            The old per-browser anonymous owner key (UUID) previously stored in
            the browser before sign-in was introduced.
      required:
        - anonymousKey
    ClaimSavedRoutesResult:
      type: object
      properties:
        claimed:
          type: number
          description: How many anonymous routes were imported into the account.
      required:
        - claimed
    SaveRouteRequest:
      type: object
      properties:
        name:
          type: string
          description: User-provided name for the route.
        nodes:
          type: array
          description: The ordered selected nodes, so the route can be reopened for editing.
          items:
            $ref: "#/components/schemas/RouteRequestNode"
        plan:
          $ref: "#/components/schemas/RoutePlan"
      required:
        - name
        - nodes
        - plan
    SavedRoute:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        nodes:
          type: array
          items:
            $ref: "#/components/schemas/RouteRequestNode"
        plan:
          $ref: "#/components/schemas/RoutePlan"
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - nodes
        - plan
        - createdAt
    SavedRouteSummary:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        distanceMeters:
          type: number
        nodeRefs:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - distanceMeters
        - nodeRefs
        - createdAt
    Region:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        country:
          type: string
          description: ISO country code (NL or BE).
        lat:
          type: number
        lon:
          type: number
        zoom:
          type: number
      required:
        - id
        - name
        - country
        - lat
        - lon
        - zoom
    BoundingBox:
      type: object
      properties:
        south:
          type: number
        north:
          type: number
        west:
          type: number
        east:
          type: number
      required:
        - south
        - north
        - west
        - east
    GeoJsonGeometry:
      type: object
      description: >
        A GeoJSON geometry (typically a Polygon or MultiPolygon) describing the
        municipality's administrative boundary, suitable for drawing on the map.
      properties:
        type:
          type: string
        coordinates:
          type: array
          items: {}
      required:
        - type
        - coordinates
    MunicipalityResult:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        displayName:
          type: string
        lat:
          type: number
        lon:
          type: number
        boundingBox:
          $ref: "#/components/schemas/BoundingBox"
        geometry:
          $ref: "#/components/schemas/GeoJsonGeometry"
      required:
        - id
        - name
        - displayName
        - lat
        - lon
        - boundingBox
