# Fietsrouteplanner self-host stack.
#
# Run from this directory (deploy/selfhost/):
#   cp .env.example .env    # then edit .env
#   docker compose up -d --build
#
# Topology (same path routing as the Azure/Replit deployments):
#
#   caddy (:80/:443, only public entrypoint, auto-HTTPS when DOMAIN is set)
#     └─> web (nginx)  serves /  and proxies:
#           /api/...  -> api-server
#           /mobile   -> mobile
#   api-server -> postgres
#
# See README.md in this directory for the full runbook.

name: fietsroute

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fietsroute}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-fietsroute}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fietsroute} -d ${POSTGRES_DB:-fietsroute}"]
      interval: 5s
      timeout: 5s
      retries: 24
      start_period: 60s
    # Uncomment to reach Postgres from the host machine (backups, psql):
    # ports:
    #   - "127.0.0.1:5432:5432"

  # One-shot: applies the Drizzle schema on every `up` (idempotent), so a
  # fresh database is ready before the API starts.
  migrate:
    build:
      context: ../..
      dockerfile: deploy/selfhost/migrate.Dockerfile
    restart: "no"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-fietsroute}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-fietsroute}
    depends_on:
      postgres:
        condition: service_healthy

  api-server:
    build:
      context: ../..
      dockerfile: artifacts/api-server/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "8080"
      DATABASE_URL: postgresql://${POSTGRES_USER:-fietsroute}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-fietsroute}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:?set CLERK_SECRET_KEY in .env}
      CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY:?set CLERK_PUBLISHABLE_KEY in .env}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DISABLE_NETWORK_PRELOAD: ${DISABLE_NETWORK_PRELOAD:-}
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  # The public domain is BAKED INTO the mobile bundles at build time.
  # Changing PUBLIC_DOMAIN requires: docker compose build mobile && docker compose up -d
  mobile:
    build:
      context: ../..
      dockerfile: artifacts/mobile/Dockerfile
      args:
        PUBLIC_DOMAIN: ${PUBLIC_DOMAIN:?set PUBLIC_DOMAIN in .env}
        BASE_PATH: /mobile
        CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY}
        CLERK_PROXY_URL: ${CLERK_PROXY_URL:-}
    restart: unless-stopped
    environment:
      PORT: "8080"
      BASE_PATH: /mobile

  web:
    build:
      context: ../..
      dockerfile: artifacts/routeplanner/Dockerfile
      args:
        VITE_CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY}
        VITE_CLERK_PROXY_URL: ${CLERK_PROXY_URL:-}
    restart: unless-stopped
    environment:
      API_ORIGIN: http://api-server:8080
      MOBILE_ORIGIN: http://mobile:8080
    depends_on:
      - api-server
      - mobile

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    environment:
      # Empty DOMAIN -> ":80" -> plain HTTP (LAN / by IP).
      # DOMAIN set   -> Caddy auto-issues a Let's Encrypt certificate.
      SITE_ADDRESS: ${DOMAIN:-:80}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web

volumes:
  pgdata:
  caddy_data:
  caddy_config:
