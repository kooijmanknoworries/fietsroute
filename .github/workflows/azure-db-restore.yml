# One-time database restore into Azure Database for PostgreSQL.
#
# Replit's outbound firewall blocks port 5432, so the Replit -> Azure restore
# cannot run from the workspace. This manual workflow runs the restore from a
# GitHub Actions runner (which has full egress) using the same
# scripts/azure/restore-azure-db.sh script.
#
# It downloads the pg_dump archive from the `db-migration-snapshot` release,
# temporarily opens the Postgres firewall to the runner's public IP, restores,
# prints row counts, then removes the temporary firewall rule.
#
# Required SECRETS:  AZURE_CREDENTIALS, AZURE_DATABASE_URL
# Required VARIABLES: AZURE_RESOURCE_GROUP, AZURE_PG_SERVER
# Run manually from the Actions tab (workflow_dispatch).

name: Restore DB to Azure

on:
  workflow_dispatch:

concurrency:
  group: azure-db-restore
  cancel-in-progress: false

jobs:
  restore:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Install PostgreSQL 16 client
        run: |
          sudo sh -c 'echo "deb https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/pgdg.gpg
          sudo apt-get update
          sudo apt-get install -y postgresql-client-16
          pg_restore --version

      - name: Download dump from release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release download db-migration-snapshot --pattern fietsroute.dump --dir .

      - name: Open Postgres firewall for this runner
        run: |
          RUNNER_IP=$(curl -s https://api.ipify.org)
          echo "Runner IP: $RUNNER_IP"
          az postgres flexible-server firewall-rule create \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
            --server-name ${{ vars.AZURE_PG_SERVER }} \
            --name gh-runner-${{ github.run_id }} \
            --start-ip-address "$RUNNER_IP" --end-ip-address "$RUNNER_IP"

      - name: Restore
        run: bash scripts/azure/restore-azure-db.sh "${{ secrets.AZURE_DATABASE_URL }}" fietsroute.dump

      - name: Remove runner firewall rule
        if: always()
        run: |
          az postgres flexible-server firewall-rule delete \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
            --server-name ${{ vars.AZURE_PG_SERVER }} \
            --name gh-runner-${{ github.run_id }} --yes || true
